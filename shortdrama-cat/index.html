<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>短剧猫品牌资产预览</title>
    <link rel="icon" type="image/png" href="./png/player-cat-128.png">
    <script src="./anime/shortdrama-cat-motion.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #161827;
        background: #f6f8fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1120px, 100%);
        margin: 0 auto;
        padding: 40px 20px 56px;
      }

      header {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 22px;
        align-items: center;
        margin-bottom: 30px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(32px, 5vw, 64px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #667085;
        line-height: 1.7;
      }

      section {
        margin-top: 22px;
        border: 1px solid rgba(22, 24, 39, .1);
        border-radius: 14px;
        background: rgba(255, 255, 255, .82);
        padding: 22px;
        box-shadow: 0 18px 42px rgba(24, 32, 52, .08);
      }

      h2 {
        margin: 0 0 16px;
        font-size: 20px;
        letter-spacing: 0;
      }

      .motion-grid,
      .asset-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }

      .preview-card {
        min-height: 170px;
        border: 1px solid rgba(22, 24, 39, .08);
        border-radius: 10px;
        background: #fff;
        display: grid;
        place-items: center;
        gap: 12px;
        padding: 16px;
        text-align: center;
      }

      .preview-card b {
        color: #303547;
        font-size: 13px;
      }

      .asset-card img {
        width: 96px;
        height: 96px;
        object-fit: contain;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      button {
        min-height: 36px;
        border: 1px solid rgba(22, 24, 39, .12);
        border-radius: 999px;
        background: #fff;
        color: #161827;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 0 14px;
      }

      button:hover,
      button.is-active {
        border-color: #f97316;
        background: #fff7ed;
        color: #c2410c;
      }

      code {
        display: block;
        overflow-x: auto;
        border-radius: 10px;
        background: #111827;
        color: #e5e7eb;
        padding: 14px;
        line-height: 1.6;
      }

      @media (max-width: 640px) {
        header {
          grid-template-columns: 1fr;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <shortdrama-cat-motion variant="player-cat" motion="enter" size="xl" label="短剧猫"></shortdrama-cat-motion>
        <div>
          <h1>短剧猫品牌资产</h1>
          <p>静态 PNG / SVG 包装 / 零依赖 Web Component 动画预览。上传整个目录到 OSS 后，本页可直接作为调试入口。</p>
        </div>
      </header>

      <section>
        <h2>动画预览</h2>
        <div class="toolbar" id="motionToolbar"></div>
        <div class="motion-grid" id="motionGrid"></div>
      </section>

      <section>
        <h2>静态资产</h2>
        <div class="asset-grid">
          <div class="preview-card asset-card">
            <img src="./png/player-cat-512.png" alt="player-cat">
            <b>player-cat</b>
          </div>
          <div class="preview-card asset-card">
            <img src="./png/cat-head-512.png" alt="cat-head">
            <b>cat-head</b>
          </div>
          <div class="preview-card asset-card">
            <img src="./png/cat-search-512.png" alt="cat-search">
            <b>cat-search</b>
          </div>
        </div>
      </section>

      <section>
        <h2>引用示例</h2>
        <code>&lt;script src="./anime/shortdrama-cat-motion.js"&gt;&lt;/script&gt;
&lt;shortdrama-cat-motion variant="player-cat" motion="enter" size="lg"&gt;&lt;/shortdrama-cat-motion&gt;</code>
      </section>
    </main>

    <script>
      const variants = ["player-cat", "cat-head", "cat-search"];
      const motions = ["idle", "enter", "loader", "pulse", "success", "error", "reveal"];
      const grid = document.getElementById("motionGrid");
      const toolbar = document.getElementById("motionToolbar");
      let currentMotion = "idle";

      function renderToolbar() {
        toolbar.innerHTML = motions.map((motion) => `<button type="button" data-motion="${motion}">${motion}</button>`).join("");
        toolbar.querySelectorAll("button").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.motion === currentMotion);
          button.addEventListener("click", () => {
            currentMotion = button.dataset.motion;
            render();
          });
        });
      }

      function render() {
        renderToolbar();
        grid.innerHTML = variants.map((variant) => `
          <div class="preview-card">
            <shortdrama-cat-motion variant="${variant}" motion="${currentMotion}" size="lg" label="${variant}"></shortdrama-cat-motion>
            <b>${variant} · ${currentMotion}</b>
          </div>
        `).join("");
      }

      render();
    </script>
  </body>
</html>
